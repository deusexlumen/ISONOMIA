<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5d4"/>
      <stop offset="100%" style="stop-color:#00c4aa"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="128" ry="128"/>
  
  <!-- Outer glow -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00f5d4" stroke-width="4" opacity="0.3"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#00f5d4" stroke-width="2" opacity="0.5"/>
  
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#glow)" stroke-width="8"/>
  
  <!-- I letter -->
  <text x="256" y="320" 
        font-family="Georgia, serif" 
        font-size="200" 
        font-weight="bold" 
        fill="#00f5d4" 
        text-anchor="middle"
        style="filter: drop-shadow(0 0 20px #00f5d4);">I</text>
  
  <!-- Decorative particles -->
  <circle cx="100" cy="100" r="6" fill="#00f5d4" opacity="0.8"/>
  <circle cx="412" cy="100" r="6" fill="#00f5d4" opacity="0.8"/>
  <circle cx="100" cy="412" r="6" fill="#00f5d4" opacity="0.8"/>
  <circle cx="412" cy="412" r="6" fill="#00f5d4" opacity="0.8"/>
</svg>
