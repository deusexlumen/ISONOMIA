<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISONOMIA | PSYCHOLOGICAL JUDO EDITION</title>

    <meta name="keywords" content="Losdemokratie, Sortition, Demokratie, politisches System, Isonomia, politische Teilhabe, Bürgerrat">
    <meta name="author" content="ISONOMIA Project">
    <meta name="theme-color" content="#00f5d4">
    <meta name="robots" content="index, follow">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://deine-domain.de/isonomia">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="ISONOMIA | Losdemokratie Entdecken">
    <meta property="og:description" content="Eine immersive Reise zur Entdeckung der Losdemokratie. Erlebe eine neue Form der Demokratie.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://deine-domain.de/isonomia">

    <meta property="og:locale" content="de_DE">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ISONOMIA | Losdemokratie Entdecken">
    <meta name="twitter:description" content="Eine immersive Reise zur Entdeckung der Losdemokratie.">
    <meta name="twitter:image" content="https://deine-domain.de/icons/og-image.png">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <link rel="mask-icon" href="/icons/safari-pinned-tab.svg" color="#00f5d4">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
        
        /* CSS Custom Properties with Type Safety */
        @property --glow-intensity {
            syntax: '<number>';
            inherits: false;
            initial-value: 0;
        }

        @property --station-hue {
            syntax: '<angle>';
            inherits: false;
            initial-value: 170deg;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Cinzel', 'Times New Roman', serif;
            cursor: crosshair;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* Chromatic Aberration Canvas */
        #chromatic-canvas {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* UI Layer */
        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .station-text {
            position: absolute;
            text-align: center;
            opacity: 0;
            pointer-events: auto;
            max-width: 800px;
            padding: 2rem;
            transform-style: preserve-3d;
            
            &.active {
                opacity: 1;
            }
            
            & .station-title {
                font-size: clamp(2.5rem, 6vw, 5rem);
                margin-bottom: 1.5rem;
                letter-spacing: 0.08em;
                line-height: 1.1;
                overflow: hidden;
                text-shadow: 
                    0 0 40px currentColor,
                    0 0 80px currentColor,
                    0 0 120px currentColor;
                animation: textPulse 4s ease-in-out infinite;
                
                & .char {
                    display: inline-block;
                    opacity: 0;
                    transform: translateY(100px) rotateX(-90deg);
                    transition: all 0.3s ease;
                    
                    &:hover {
                        transform: scale(1.3) rotateY(15deg);
                        filter: brightness(1.5);
                    }
                }
            }
            
            & .station-subtitle {
                font-family: 'Inter', sans-serif;
                font-size: 1.2rem;
                line-height: 1.8;
                color: rgba(255, 255, 255, 0.9);
                opacity: 0;
                transform: translateY(30px);
                text-shadow: 0 2px 20px rgba(0,0,0,0.5);
                margin-bottom: 2rem;
            }
        }

        @keyframes textPulse {
            0%, 100% { text-shadow: 0 0 40px currentColor, 0 0 80px currentColor; }
            50% { text-shadow: 0 0 60px currentColor, 0 0 120px currentColor, 0 0 160px currentColor; }
        }

        /* Commitment-Bar (NEU) */
        #commitment-panel {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,245,212,0.3);
            border-radius: 30px;
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #commitment-panel.visible {
            opacity: 1;
        }

        .commitment-label {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
        }

        .commitment-bar {
            width: 200px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .commitment-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f5d4, #ffd700);
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.5);
        }

        .commitment-count {
            font-size: 0.9rem;
            color: #00f5d4;
            font-weight: 600;
            min-width: 60px;
        }

        .commitment-dots {
            display: flex;
            gap: 5px;
        }

        .commitment-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .commitment-dot.active {
            background: #00f5d4;
            box-shadow: 0 0 10px #00f5d4;
        }

        /* Dynamic AI Text Highlight */
        .ai-generated {
            background: linear-gradient(90deg, transparent, rgba(0,245,212,0.2), transparent);
            padding: 0 10px;
            border-left: 2px solid #00f5d4;
            animation: aiGlow 2s ease-in-out infinite;
        }

        @keyframes aiGlow {
            0%, 100% { border-left-color: #00f5d4; }
            50% { border-left-color: #ffd700; }
        }

        /* Portal Options */
        .portal-container {
            position: absolute;
            bottom: 10%;
            display: flex;
            gap: 2rem;
            opacity: 0;
            pointer-events: auto;
            transform-style: preserve-3d;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }

        .portal-wrapper {
            position: relative;
            min-width: 180px;
            padding: 20px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            transform-style: preserve-3d;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            
            &:hover {
                transform: translateZ(30px) scale(1.05);
                border-color: currentColor;
                box-shadow: 0 0 40px currentColor;
            }
            
            &.commitment-yes {
                border-color: #00f5d4;
                background: rgba(0, 245, 212, 0.1);
            }
            
            &.commitment-no {
                border-color: #ff6b9d;
                background: rgba(255, 107, 157, 0.1);
            }
            
            &[data-commitment="yes"] .portal-commitment-indicator {
                opacity: 1;
                transform: scale(1);
            }
            
            & .portal-label {
                font-size: 0.85rem;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                color: #fff;
                text-align: center;
                pointer-events: none;
                text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            }
            
            & .portal-commitment-indicator {
                position: absolute;
                top: -10px;
                right: -10px;
                width: 24px;
                height: 24px;
                border-radius: 50%;
                background: #00f5d4;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.7rem;
                opacity: 0;
                transform: scale(0);
                transition: all 0.3s ease;
            }
        }

        /* Profile Display (Enhanced) */
        #profile-panel {
            position: fixed;
            top: 100px;
            right: 30px;
            width: 300px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,245,212,0.3);
            border-radius: 15px;
            padding: 20px;
            z-index: 20;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.5s ease;
        }

        #profile-panel.visible {
            opacity: 1;
            transform: translateX(0);
        }

        #profile-panel h3 {
            color: #00f5d4;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .profile-stat {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
        }

        .profile-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }

        .profile-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f5d4, #ffd700);
            width: 0%;
            transition: width 1s ease;
        }

        .archetype-display {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,245,212,0.1);
            border-radius: 8px;
            text-align: center;
            font-size: 1rem;
            color: #00f5d4;
            border: 1px solid rgba(0,245,212,0.3);
        }

        .archetype-display small {
            display: block;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }

        /* Objection Handler UI */
        #objection-panel {
            position: fixed;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            max-width: 600px;
            background: rgba(255, 107, 157, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 107, 157, 0.5);
            border-radius: 15px;
            padding: 20px;
            z-index: 25;
            opacity: 0;
            transition: all 0.5s ease;
            pointer-events: auto;
        }

        #objection-panel.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #objection-panel h4 {
            color: #ff6b9d;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        #objection-panel p {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255,255,255,0.9);
        }

        /* Collectibles */
        #collectibles-container {
            position: fixed;
            top: 100px;
            left: 30px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .collectible {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            opacity: 0.3;
            transition: all 0.5s ease;
            cursor: pointer;
            
            &.collected {
                opacity: 1;
                background: rgba(0, 245, 212, 0.2);
                border-color: #00f5d4;
                box-shadow: 0 0 30px rgba(0, 245, 212, 0.6);
                animation: collectibleFloat 3s ease-in-out infinite;
            }
        }

        @keyframes collectibleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Audio Toggle */
        #audio-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 20;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        #audio-toggle:hover {
            border-color: #00f5d4;
            box-shadow: 0 0 30px rgba(0, 245, 212, 0.5);
        }

        /* Progress */
        #progress-container {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #progress-ring {
            width: 300px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f5d4, #00ffaa, #ffd700, #ff6b9d, #00f5d4);
            background-size: 400% 100%;
            box-shadow: 0 0 30px rgba(0, 245, 212, 0.8);
            animation: progressShine 3s linear infinite;
        }

        @keyframes progressShine {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        /* Loading Screen */
        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 3rem;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease;
        }

        .loading-blob {
            width: 150px;
            height: 150px;
            filter: drop-shadow(0 0 40px rgba(0, 245, 212, 0.8));
        }

        .loading-text {
            color: rgba(0, 245, 212, 0.8);
            font-size: 0.9rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        /* Vignette Overlay */
        #vignette {
            position: fixed;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.8) 100%);
        }

        /* Motion Blur Overlay */
        #motion-blur {
            position: fixed;
            inset: 0;
            z-index: 4;
            pointer-events: none;
            background: rgba(0,0,0,0.1);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Micro-Commitment Highlight */
        .commitment-highlight {
            animation: commitmentPulse 1s ease-in-out;
        }

        @keyframes commitmentPulse {
            0%, 100% { box-shadow: 0 0 20px #00f5d4; }
            50% { box-shadow: 0 0 60px #00f5d4, 0 0 100px #00f5d4; }
        }

        /* Honesty Prompt Style */
        .honesty-prompt {
            border: 2px solid #ffd700 !important;
            animation: honestyGlow 2s ease-in-out infinite;
        }

        @keyframes honestyGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            #commitment-panel {
                left: 10px;
                right: 10px;
                transform: none;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .commitment-bar {
                width: 150px;
            }
            
            #profile-panel {
                width: 250px;
                right: 10px;
            }
            
            .portal-container {
                gap: 1rem;
                bottom: 5%;
            }
            
            .portal-wrapper {
                min-width: 140px;
                padding: 15px 20px;
            }
        }

        /* Skip Link for Keyboard Navigation */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #000;
            color: #fff;
            padding: 8px 16px;
            text-decoration: none;
            z-index: 10000;
            border: 2px solid #00f5d4;
            transition: top 0.3s;
        }
        .skip-link:focus {
            top: 0;
        }

        /* Focus Indicators (WCAG 2.2) */
        *:focus-visible {
            outline: 3px solid #00f5d4;
            outline-offset: 4px;
            border-radius: 4px;
        }

        /* Visually Hidden Class */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Reduced Motion Support */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* Target Size Minimum (WCAG 2.2) */
        button, .portal-wrapper, #audio-toggle, .collectible {
            min-width: 44px;
            min-height: 44px;
        }

        /* Container Queries 2025 */
        #ui-layer {
            container-type: inline-size;
            container-name: ui;
        }

        @container ui (max-width: 600px) {
            .station-text {
                padding: 1rem;
                max-width: 95vw;
                
                & .station-title {
                    font-size: clamp(1.8rem, 8vw, 3rem);
                }
                
                & .station-subtitle {
                    font-size: 1rem;
                }
            }
            
            .portal-container {
                flex-direction: column;
                gap: 1rem;
                bottom: 5%;
            }
            
            .portal-wrapper {
                min-width: 200px;
                padding: 15px 25px;
            }
        }

        @container ui (max-height: 500px) {
            .station-text {
                padding: 1rem;
                
                & .station-subtitle {
                    margin-bottom: 1rem;
                    line-height: 1.5;
                }
            }
            
            .portal-container {
                bottom: 2%;
            }
        }

        /* Scroll-Driven Animations (Native CSS 2025) */
        @supports (animation-timeline: scroll()) {
            .station-title {
                animation: fadeInUp linear;
                animation-timeline: view();
                animation-range: entry 0% cover 40%;
            }
            
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(50px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        }

        /* Fallback */
        @supports not (animation-timeline: scroll()) {
            .station-title {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <a href="#ui-layer" class="skip-link">Zum Hauptinhalt springen</a>
    <!-- Loading Screen -->
    <div id="loading" role="status" aria-live="polite" aria-label="Ladebildschirm">
        <svg class="loading-blob" viewBox="0 0 100 100">
            <path id="loading-path" fill="none" stroke="#00f5d4" stroke-width="2"
                  d="M50,10 C70,10 90,30 90,50 C90,70 70,90 50,90 C30,90 10,70 10,50 C10,30 30,10 50,10"/>
        </svg>
        <div class="loading-text">Initialisiere Psychological Judo</div>
    </div>

    <!-- Audio Toggle -->
    <button id="audio-toggle" onclick="Journey.toggleAudio()" aria-label="Audio ein- oder ausschalten" aria-pressed="false" type="button"><span aria-hidden="true">🔊</span><span class="visually-hidden">Audio Status</span></button>

    <!-- Commitment Panel (NEU) -->
    <div id="commitment-panel" role="region" aria-label="Commitment Fortschritt">
        <span class="commitment-label">Commitment</span>
        <div class="commitment-bar">
            <div class="commitment-fill" id="commitment-fill"></div>
        </div>
        <span class="commitment-count" id="commitment-count">0/7</span>
        <div class="commitment-dots" id="commitment-dots">
            <div class="commitment-dot"></div>
            <div class="commitment-dot"></div>
            <div class="commitment-dot"></div>
            <div class="commitment-dot"></div>
            <div class="commitment-dot"></div>
            <div class="commitment-dot"></div>
            <div class="commitment-dot"></div>
        </div>
    </div>

    <!-- Collectibles -->
    <div id="collectibles-container" role="region" aria-label="Gesammelte Weisheiten">
        <div class="collectible" data-id="wisdom" title="Weisheit">📜</div>
        <div class="collectible" data-id="courage" title="Mut">🔥</div>
        <div class="collectible" data-id="hope" title="Hoffnung">✨</div>
        <div class="collectible" data-id="truth" title="Wahrheit">👁️</div>
    </div>

    <!-- AI Profile Panel -->
    <div id="profile-panel" role="complementary" aria-label="Psychologisches Profil">
        <h3>Dein Psychologisches Profil</h3>
        
        <div class="profile-stat">
            <span>Engagement</span>
            <span id="stat-engagement">-</span>
        </div>
        
        <div class="profile-stat">
            <span>Skepsis</span>
            <span id="stat-skepticism">-</span>
        </div>
        
        <div class="profile-stat">
            <span>Werte-Anker</span>
            <span id="stat-value">-</span>
        </div>
        
        <div class="profile-stat">
            <span>Rebellion</span>
            <span id="stat-rebellion">0%</span>
        </div>
        <div class="profile-bar"><div class="profile-bar-fill" id="bar-rebellion"></div></div>
        
        <div class="profile-stat">
            <span>Empathie</span>
            <span id="stat-empathy">0%</span>
        </div>
        <div class="profile-bar"><div class="profile-bar-fill" id="bar-empathy"></div></div>
        
        <div class="profile-stat">
            <span>Strategie</span>
            <span id="stat-strategy">0%</span>
        </div>
        <div class="profile-bar"><div class="profile-bar-fill" id="bar-strategy"></div></div>
        
        <div class="archetype-display" id="archetype">
            Analysiere...
            <small>Basierend auf deinen Entscheidungen</small>
        </div>
    </div>

    <!-- Objection Panel (NEU) -->
    <div id="objection-panel" role="alert" aria-live="polite" aria-label="Einwand Information">
        <h4>💭 Einwand erkannt</h4>
        <p id="objection-text">...</p>
    </div>

        // ==================================================================
        // MODUL 1: EventBus (Lose Kopplung)
        // ==================================================================
        const EventBus = {
            events: {},
            
            on(event, callback) {
                if (!this.events[event]) {
                    this.events[event] = [];
                }
                this.events[event].push(callback);
            },
            
            off(event, callback) {
                if (!this.events[event]) return;
                this.events[event] = this.events[event].filter(cb => cb !== callback);
            },
            
            emit(event, data) {
                if (!this.events[event]) return;
                this.events[event].forEach(callback => {
                    try {
                        callback(data);
                    } catch (e) {
                        console.error(`EventBus Error in ${event}:`, e);
                    }
                });
            }
        };

                this.announcer = document.createElement('div');
                this.announcer.setAttribute('role', 'status');
                this.announcer.setAttribute('aria-live', 'polite');
                this.announcer.setAttribute('aria-atomic', 'true');
                this.announcer.className = 'visually-hidden';
                document.body.appendChild(this.announcer);
                
                this.setupKeyboardNav();
            },
            
            announce(message, priority = 'polite') {
                this.announcer.setAttribute('aria-live', priority);
                this.announcer.textContent = message;
                setTimeout(() => {
                    this.announcer.textContent = '';
                }, 1000);
            },
            
            setupKeyboardNav() {
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.handleEscape();
                    }
                });
            },
            
            handleEscape() {
                // Handle escape key for modals/overlays
                const panel = document.querySelector('#objection-panel.visible');
                if (panel) {
                    panel.classList.remove('visible');
                }

            announceStationChange(stationName) {
                this.announce(`Neue Station erreicht: ${stationName}`);

                this.commitments.push({

                    timestamp: Date.now()

                // Score berechnen (nur "Ja" zählt voll)

                    nodeId, 
                    agreed, 
                    score: this.commitmentScore,
                    count: this.commitments.filter(c => c.agreed).length

                    this.raisedObjections.push(objectionType);
                    this._persist();
                    EventBus.emit('objection:raised', { objectionType });
                }

            resolveObjection(objectionType) {
                if (!this.resolvedObjections.includes(objectionType)) {
                    this.resolvedObjections.push(objectionType);
                    this._persist();
                    EventBus.emit('objection:resolved', { objectionType });
                }

            isObjectionResolved(objectionType) {
                return this.resolvedObjections.includes(objectionType);

                if (this.currentNodeStartTime && this.pathTaken.length > 0) {
                    const lastNode = this.pathTaken[this.pathTaken.length - 1];
                    this.nodeVisitTimes[lastNode] = now - this.currentNodeStartTime;
                }
                this.pathTaken.push(nodeId);
                this.currentNodeStartTime = now;
                this._persist();

                if (stats.rebellion !== undefined) this.rebellion = Math.min(100, this.rebellion + stats.rebellion);

                if (stats.strategy !== undefined) this.strategy = Math.min(100, this.strategy + stats.strategy);

                EventBus.emit('stats:updated', { rebellion: this.rebellion, empathy: this.empathy, strategy: this.strategy });

                const noCount = this.commitments.filter(c => !c.agreed).length;

                const lowerText = text.toLowerCase();

                        if (pattern.test(lowerText)) {

        // ==================================================================
        // OPTIMIZED PARTICLE SYSTEM (Shader-Based)
        // Reduces draw calls from 8000 to 1
        // ==================================================================
        const OptimizedParticleSystem = {
            MAX_PARTICLES: 8000,
            particles: null,
            geometry: null,
            material: null,
            
            init(scene) {
                // BufferGeometry für maximale Performance
                this.geometry = new THREE.BufferGeometry();
                
                const positions = new Float32Array(this.MAX_PARTICLES * 3);
                const colors = new Float32Array(this.MAX_PARTICLES * 3);
                const sizes = new Float32Array(this.MAX_PARTICLES);
                const phases = new Float32Array(this.MAX_PARTICLES);
                
                // Initialisierung
                for (let i = 0; i < this.MAX_PARTICLES; i++) {
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random() * 2) - 1);
                    const r = 5 + Math.random() * 15;
                    
                    positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                    positions[i * 3 + 2] = r * Math.cos(phi);
                    
                    const color = new THREE.Color();
                    color.setHSL(0.5 + Math.random() * 0.1, 0.8, 0.5);
                    colors[i * 3] = color.r;
                    colors[i * 3 + 1] = color.g;
                    colors[i * 3 + 2] = color.b;
                    
                    sizes[i] = Math.random() * 2 + 0.5;
                    phases[i] = Math.random() * Math.PI * 2;
                }
                
                this.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                this.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                this.geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
                this.geometry.setAttribute('phase', new THREE.BufferAttribute(phases, 1));
                
                // ShaderMaterial für GPU-basierte Animation
                this.material = new THREE.ShaderMaterial({
                    uniforms: {
                        uTime: { value: 0 },
                        uColor1: { value: new THREE.Color(0x00f5d4) },
                        uColor2: { value: new THREE.Color(0xff6b9d) }
                    },
                    vertexShader: `
                        attribute float size;
                        attribute float phase;
                        varying vec3 vColor;
                        uniform float uTime;
                        
                        void main() {
                            vColor = color;
                            
                            // GPU-basierte Animation
                            vec3 pos = position;
                            float wave = sin(uTime * 0.5 + phase) * 0.15;
                            pos.y += wave;
                            pos.x += cos(uTime * 0.3 + phase) * 0.1;
                            
                            // Rotation
                            float angle = uTime * 0.05 + phase * 0.5;
                            float x = pos.x * cos(angle) - pos.z * sin(angle);
                            float z = pos.x * sin(angle) + pos.z * cos(angle);
                            pos.x = x;
                            pos.z = z;
                            
                            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                            gl_PointSize = size * (300.0 / -mvPosition.z);
                            gl_Position = projectionMatrix * mvPosition;
                        }
                    `,
                    fragmentShader: `
                        varying vec3 vColor;
                        
                        void main() {
                            // Kreisförmige Partikel mit Soft Edge
                            float dist = distance(gl_PointCoord, vec2(0.5));
                            if (dist > 0.5) discard;
                            
                            float alpha = 1.0 - smoothstep(0.3, 0.5, dist);
                            gl_FragColor = vec4(vColor, alpha * 0.8);
                        }
                    `,
                    transparent: true,
                    vertexColors: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });
                
                this.particles = new THREE.Points(this.geometry, this.material);
                scene.add(this.particles);
                
                console.log('✓ Optimized Particle System: 1 draw call for 8000 particles');
            },
            
            update(time) {
                if (this.material) {
                    this.material.uniforms.uTime.value = time * 0.001;
                }
            },
            
            dispose() {
                this.geometry?.dispose();
                this.material?.dispose();
                if (this.particles) {
                    this.particles.parent?.remove(this.particles);
                }
            }
        };

                UserProfile.recordNodeVisit(nodeId);

            handleOptionClick(option, currentNodeId) {
                // Profil-Updates
                if (option.profileSet) {
                    for (const [key, value] of Object.entries(option.profileSet)) {
                        UserProfile.set(key, value);
                    }
                }
                
                // Legacy Stats
                if (option.statBoost) {
                    UserProfile.updateLegacyStats(option.statBoost);
                }
                
                // Commitment tracking
                if (option.commitment) {
                    const agreed = option.commitment.agreed !== false;
                    UserProfile.addCommitment(
                        currentNodeId, 
                        agreed, 
                        option.commitment.question
                    );
                    
                    // Kritische Commitments hervorheben
                    if (option.commitment.critical && agreed) {
                        this.createCommitmentEffect();
                    }
                }
                
                // Einwand auflösen
                if (option.resolveObjection) {
                    UserProfile.resolveObjection(option.resolveObjection);
                }
                
                // Aktionen
                if (option.action) {
                    this.handleAction(option.action);
                }
                
                // Navigation
                if (option.next) {
                    this.navigateToNode(option.next);
                }
            },

            createCommitmentEffect() {
                // Visuelles Feedback für kritische Commitments
                const panel = document.getElementById('commitment-panel');
                if (panel) {
                    panel.classList.add('commitment-highlight');
                    setTimeout(() => panel.classList.remove('commitment-highlight'), 1000);
                }

                switch(action) {
                    case 'startSimulation':
                        this.startSimulation();
                        break;
                    case 'shareLink':
                        this.shareLink();
                        break;
                    case 'shareSocial':
                        this.shareSocial();
                        break;
                    case 'openCommunity':
                        alert('Community-Link würde hier geöffnet werden: sortitionfoundation.org');
                        break;
                }
            },

            startSimulation() {
                // Einfache Simulation
                const names = ['Maria', 'Hans', 'Fatima', 'Klaus', 'Lisa', 'Ahmet', 'Sophie', 'Wolfgang'];
                const jobs = ['Krankenschwester', 'Bauarbeiter', 'Lehrerin', 'Ingenieur', 'Verkäuferin', 'Student', 'Rentner', 'Künstler'];
                
                const citizen = {
                    name: names[Math.floor(Math.random() * names.length)],
                    job: jobs[Math.floor(Math.random() * jobs.length)],
                    age: Math.floor(Math.random() * 40) + 25
                };
                
                alert(`🎲 LOS GEZOGEN 🎲\n\nName: ${citizen.name}\nAlter: ${citizen.age}\nBeruf: ${citizen.job}\n\nDiese Person würde für ein Jahr im Parlament sitzen und über Gesetze entscheiden.`);
            },

            shareLink() {
                const url = window.location.href.split('?')[0] + '?step=' + this.currentNodeId;
                navigator.clipboard?.writeText(url);
                alert('Link kopiert: ' + url);
            },

            shareSocial() {
                const text = "Ich habe gerade etwas über Sortition Democracy (Losdemokratie) gelernt. Faszinierend!";
                const url = window.location.href;
                window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
            },

            updateProgress() {
                const progress = Math.min(100, (UserProfile.commitments.filter(c => c.agreed).length / 7) * 100);
                anime({
                    targets: '#progress-fill',
                    width: `${progress}%`,
                    duration: 800,
                    easing: 'easeOutExpo'
                });
            },

            // 3D- und Audio-Methoden (wie im Original)
            createScene() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x000000, 0.0015);

                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 0, 50);

                this.renderer = new THREE.WebGLRenderer({ 
                    antialias: true, 
                    alpha: true,
                    powerPreference: "high-performance"
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.toneMapping = THREE.ReinhardToneMapping;
                this.renderer.toneMappingExposure = 1.5;
                document.getElementById('canvas-container').appendChild(this.renderer.domElement);

                window.addEventListener('resize', () => this.onResize());
            },

            createParticles() {
                // Use OptimizedParticleSystem for better performance
                OptimizedParticleSystem.init(this.scene);
                this.particleSystem = OptimizedParticleSystem.particles;
            },

            initAudio() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log('Web Audio API not supported');
                }
            },

            playStationSound(freq) {
                if (!this.audioEnabled || !this.audioContext) return;
                
                this.oscillators?.forEach(osc => {
                    try { osc.stop(); } catch(e) {}
                });
                this.oscillators = [];

                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                const filter = this.audioContext.createBiquadFilter();
                
                osc.type = 'sine';
                osc.frequency.value = freq;
                
                filter.type = 'lowpass';
                filter.frequency.value = 600;
                filter.Q.value = 5;
                
                gain.gain.value = 0.03;
                
                const lfo = this.audioContext.createOscillator();
                const lfoGain = this.audioContext.createGain();
                lfo.frequency.value = 0.1;
                lfoGain.gain.value = 100;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                lfo.start();
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.audioContext.destination);
                
                osc.start();
                this.oscillators.push(osc, lfo);
            },

            setupMouseInteraction() {
                document.addEventListener('mousemove', (e) => {
                    this.mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
                    this.mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;

                    const speed = Math.abs(e.movementX) + Math.abs(e.movementY);
                    this.applyChromaticAberration(speed);

                    if (this.camera && !this.isTransitioning) {
                        const targetX = this.mousePos.x * 8;
                        const targetY = this.mousePos.y * 8;
                        this.camera.position.x += (targetX - this.camera.position.x) * 0.03;
                        this.camera.position.y += (targetY - this.camera.position.y) * 0.03;
                    }
                });

                document.addEventListener('click', (e) => {
                    this.createClickExplosion(e.clientX, e.clientY);
                });
            },

            setupPostProcessing() {
                this.chromaticCanvas = document.getElementById('chromatic-canvas');
                this.chromaticCtx = this.chromaticCanvas.getContext('2d');
                this.chromaticCanvas.width = window.innerWidth;
                this.chromaticCanvas.height = window.innerHeight;
            },

            applyChromaticAberration(intensity) {
                const canvas = this.chromaticCanvas;
                const ctx = this.chromaticCtx;
                
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                if (intensity < 2) return;
                
                const offset = Math.min(intensity * 2, 20);
                
                ctx.globalCompositeOperation = 'screen';
                
                ctx.fillStyle = 'rgba(255,0,0,0.1)';
                ctx.fillRect(Math.random() * offset, Math.random() * offset, canvas.width, canvas.height);
                
                ctx.fillStyle = 'rgba(0,100,255,0.1)';
                ctx.fillRect(-Math.random() * offset, -Math.random() * offset, canvas.width, canvas.height);
                
                const vignette = document.getElementById('vignette');
                vignette.style.opacity = Math.min(intensity / 50, 0.8);
            },

            createClickExplosion(x, y) {
                const colors = ['#00f5d4', '#ff6b9d', '#ffd700', '#ffffff'];
                const particleCount = 25; // Mehr Partikel
                
                // Haupt-Explosion
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    const size = Math.random() * 10 + 4;
                    particle.style.cssText = `
                        position: fixed;
                        left: ${x}px;
                        top: ${y}px;
                        width: ${size}px;
                        height: ${size}px;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        border-radius: 50%;
                        pointer-events: none;
                        z-index: 999;
                        box-shadow: 0 0 ${size * 3}px currentColor;
                    `;
                    document.body.appendChild(particle);

                    const angle = (i / particleCount) * Math.PI * 2 + Math.random() * 0.5;
                    const distance = 100 + Math.random() * 200;
                    const duration = 600 + Math.random() * 800;

                    anime({
                        targets: particle,
                        translateX: Math.cos(angle) * distance,
                        translateY: Math.sin(angle) * distance,
                        scale: [1, 0.5, 0],
                        opacity: [1, 0.8, 0],
                        rotate: Math.random() * 720 - 360,
                        duration: duration,
                        easing: 'spring(1, 50, 10, 0)',
                        complete: () => particle.remove()
                    });
                }
                
                // Ring-Explosion (sekundärer Effekt)
                for (let i = 0; i < 8; i++) {
                    const ring = document.createElement('div');
                    ring.style.cssText = `
                        position: fixed;
                        left: ${x}px;
                        top: ${y}px;
                        width: 20px;
                        height: 20px;
                        border: 2px solid ${colors[i % colors.length]};
                        border-radius: 50%;
                        pointer-events: none;
                        z-index: 998;
                        transform: translate(-50%, -50%);
                    `;
                    document.body.appendChild(ring);
                    
                    anime({
                        targets: ring,
                        width: 150,
                        height: 150,
                        opacity: [0.8, 0],
                        borderWidth: [3, 0],
                        duration: 800,
                        delay: i * 50,
                        easing: 'easeOutExpo',
                        complete: () => ring.remove()
                    });
                }

                const blur = document.getElementById('motion-blur');
                anime({
                    targets: blur,
                    opacity: [0, 0.3, 0],
                    duration: 200,
                    easing: 'easeOutQuad'
                });
            },

            collectItem(id) {
                if (this.collected.has(id)) return;
                
                this.collected.add(id);
                const el = document.querySelector(`[data-id="${id}"]`);
                if (el) {
                    el.classList.add('collected');
                    
                    if (this.audioEnabled && this.audioContext) {
                        const osc = this.audioContext.createOscillator();
                        const gain = this.audioContext.createGain();
                        osc.frequency.setValueAtTime(523.25, this.audioContext.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(1046.5, this.audioContext.currentTime + 0.1);
                        gain.gain.value = 0.1;
                        gain.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.5);
                        osc.connect(gain);
                        gain.connect(this.audioContext.destination);
                        osc.start();
                        osc.stop(this.audioContext.currentTime + 0.5);
                    }
                }
            },

            animateLoading() {
                // Prüfe ob anime.js verfügbar ist
                const hasAnime = typeof anime !== 'undefined' && anime;
                
                if (hasAnime) {
                    // Verbesserte Loading-Animation mit Elastic-Easing
                    try {
                        anime({
                            targets: '#loading-path',
                            d: [
                                'M50,10 C70,10 90,30 90,50 C90,70 70,90 50,90 C30,90 10,70 10,50 C10,30 30,10 50,10',
                                'M40,20 C60,5 85,25 85,50 C85,75 60,95 40,80 C20,95 5,70 5,50 C5,30 20,5 40,20',
                                'M50,5 C75,15 95,35 85,60 C95,80 75,95 50,85 C25,95 5,80 15,60 C5,35 25,15 50,5',
                                'M30,30 C50,10 80,20 80,50 C80,80 50,90 30,70 C10,90 0,60 10,50 C0,40 10,10 30,30'
                            ],
                            duration: 2000,
                            easing: 'spring(1, 80, 12, 0)',
                            direction: 'alternate',
                            loop: true
                        });
                        
                        // Pulsierender Glow-Effekt
                        anime({
                            targets: '#loading-path',
                            strokeWidth: [2, 4, 2],
                            stroke: ['#00f5d4', '#ffd700', '#00f5d4'],
                            duration: 1500,
                            loop: true,
                            easing: 'easeInOutSine'
                        });
                        
                        // Loading-Text Fade
                        anime({
                            targets: '.loading-text',
                            opacity: [0.5, 1, 0.5],
                            letterSpacing: ['0.4em', '0.6em', '0.4em'],
                            duration: 2000,
                            loop: true,
                            easing: 'easeInOutQuad'
                        });
                    } catch (e) {
                        console.log('Anime.js animation failed, using CSS fallback');
                    }
                } else {
                    // CSS Fallback für Loading Animation
                    console.log('Using CSS fallback for loading animation');
                    const loadingPath = document.getElementById('loading-path');
                    if (loadingPath) {
                        loadingPath.style.animation = 'loadingPulse 2s ease-in-out infinite';
                    }
                }

                // Loading Screen nach 3 Sekunden ausblenden
                setTimeout(() => {
                    const loading = document.getElementById('loading');
                    if (!loading) return;
                    
                    if (hasAnime) {
                        try {
                            anime({
                                targets: '#loading',
                                opacity: [1, 0],
                                scale: [1, 1.1],
                                duration: 800,
                                easing: 'easeOutExpo',
                                complete: () => this.finishLoading()
                            });
                        } catch (e) {
                            this.finishLoading();
                        }
                    } else {
                        // CSS Fallback
                        loading.style.transition = 'opacity 0.8s ease';
                        loading.style.opacity = '0';
                        setTimeout(() => this.finishLoading(), 800);
                    }
                }, 3000);
            },
            
            finishLoading() {
                const loading = document.getElementById('loading');
                if (loading) loading.classList.add('hidden');
                
                // Start-Node anzeigen
                const startNode = this.currentNodeId || 'start';
                this.showNode(startNode);
                this.currentNodeId = startNode;
                
                this.animate();
            },

            animate() {
                requestAnimationFrame(() => this.animate());
                
                const time = Date.now();
                
                // Use optimized shader-based particle system
                OptimizedParticleSystem.update(time);

                this.chromaticCtx.fillStyle = 'rgba(0,0,0,0.05)';
                this.chromaticCtx.fillRect(0, 0, this.chromaticCanvas.width, this.chromaticCanvas.height);

                this.renderer.render(this.scene, this.camera);
            },

            toggleAudio() {
                this.audioEnabled = !this.audioEnabled;
                const btn = document.getElementById('audio-toggle');
                btn.textContent = this.audioEnabled ? '🔊' : '🔇';
                
                if (!this.audioEnabled) {
                    this.oscillators?.forEach(osc => {
                        try { osc.stop(); } catch(e) {}
                    });
                } else if (this.currentStation !== undefined) {
                    const station = this.stationData[this.currentStation];
                    if (station) this.playStationSound(station.soundFreq);
                }
            },

            onResize() {
                if (!this.camera || !this.renderer) return;
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.chromaticCanvas.width = window.innerWidth;
                this.chromaticCanvas.height = window.innerHeight;
            }
        };

        // Journey starten mit Fehlerbehandlung
        try {
            Journey.init();
        } catch (error) {
            console.error('Fehler bei Initialisierung:', error);
            // Trotzdem Loading ausblenden
            document.getElementById('loading').classList.add('hidden');
            // Fehlermeldung anzeigen
            document.body.innerHTML += '<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,0,0,0.8);color:white;padding:20px;border-radius:10px;z-index:10001;">Fehler beim Laden. Bitte Seite neu laden (F5).</div>';
        }

        // ==================================================================
        // Performance Monitoring
        // ==================================================================
        const PerformanceMonitor = {
            init() {
                this.logMemory();
                setInterval(() => this.logMemory(), 30000);
            },
            
            logMemory() {
                if (Journey.renderer?.info) {
                    const info = Journey.renderer.info;
                    console.log('=== PERFORMANCE STATUS ===');
                    console.log('Geometries:', info.memory.geometries);
                    console.log('Textures:', info.memory.textures);
                    console.log('Draw Calls:', info.render.calls);
                    console.log('Triangles:', info.render.triangles);
                    console.log('==========================');
                }
            }
        };

        // Debounce utility
        const debounce = (fn, delay) => {
            let timeoutId;
            return (...args) => {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => fn(...args), delay);
            };
        };

        // Apply debounced resize handler
        window.addEventListener('resize', debounce(() => {
            if (Journey.camera && Journey.renderer) {
                Journey.camera.aspect = window.innerWidth / window.innerHeight;
                Journey.camera.updateProjectionMatrix();
                Journey.renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }, 250));

        // Initialize performance monitoring
        PerformanceMonitor.init();

        // ==================================================================
        // Memory Management
        // ==================================================================
        const MemoryManager = {
            disposeGeometry(geometry) {
                if (geometry) geometry.dispose();
            },
            
            disposeMaterial(material) {
                if (!material) return;
                if (Array.isArray(material)) {
                    material.forEach(m => this.disposeMaterial(m));
                } else {
                    Object.keys(material).forEach(key => {
                        const value = material[key];
                        if (value && value.isTexture) {
                            value.dispose();
                        }
                    });
                    material.dispose();
                }
            },
            
            disposeMesh(mesh) {
                if (!mesh) return;
                this.disposeGeometry(mesh.geometry);
                this.disposeMaterial(mesh.material);
                if (mesh.parent) {
                    mesh.parent.remove(mesh);
                }
            }
        };

        // ==================================================================
        // WEB WORKER FOR PHYSICS (Deferred loading)
        // ==================================================================
        const PhysicsWorkerManager = {
            worker: null,
            isSupported: typeof Worker !== 'undefined',
            
            init() {
                if (!this.isSupported) {
                    console.log('Web Workers not supported, using main thread');
                    return;
                }
                
                // Create inline worker
                const workerScript = `
                    self.onmessage = function(e) {
                        const { positions, velocities, count, type } = e.data;
                        
                        if (type === 'update') {
                            for (let i = 0; i < count; i++) {
                                const idx = i * 3;
                                positions[idx] += velocities[idx] * 0.016;
                                positions[idx + 1] += velocities[idx + 1] * 0.016;
                                positions[idx + 2] += velocities[idx + 2] * 0.016;
                                
                                // Boundary check
                                if (Math.abs(positions[idx]) > 50) velocities[idx] *= -1;
                                if (Math.abs(positions[idx + 1]) > 50) velocities[idx + 1] *= -1;
                                if (Math.abs(positions[idx + 2]) > 50) velocities[idx + 2] *= -1;
                            }
                            
                            self.postMessage({ positions, velocities, type: 'updated' });
                        }
                    };
                `;
                
                const blob = new Blob([workerScript], { type: 'application/javascript' });
                this.worker = new Worker(URL.createObjectURL(blob));
                
                this.worker.onmessage = (e) => {
                    EventBus.emit('physics:updated', e.data);
                };
                
                console.log('✓ Physics Worker initialized');
            },
            
            update(positions, velocities, count) {
                if (!this.worker) {
                    // Fallback to main thread
                    return null;
                }
                
                this.worker.postMessage({
                    positions,
                    velocities,
                    count,
                    type: 'update'
                });
                
                return true;
            },
            
            terminate() {
                this.worker?.terminate();
                this.worker = null;
            }
        };

        // Initialize worker after page load
        window.addEventListener('load', () => {
            setTimeout(() => PhysicsWorkerManager.init(), 1000);
        });
        
        // ==================================================================
        // SERVICE WORKER REGISTRATION (PWA)
        // ==================================================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('✓ Service Worker registered:', registration.scope);
                        
                        // Check for updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('✓ New version available');
                                    // Optional: Show update notification
                                }
                            });
                        });
                    })
                    .catch(error => {
                        console.log('✗ Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
